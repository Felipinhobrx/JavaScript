<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador</title>
    <style>
        body {
            background-color: lightblue;
        }

        h1 {
            text-align: center;
            text-shadow: 3px 3px 5px gray;
            font-size: 2.6em;
            font-family: 'Courier New', Courier, monospace;
        }

        section {
            background-color: white;
            border: 2px solid black;
            border-radius: 5px;
            padding: 10px;

        }
    </style>
</head>
<body>
    <h1>Vamos Contar</h1>

    <section>
        <p>
            <label for="iinicio">Inicio: </label>
            <input type="number" name="iinicio" id="iinicio">
        </p>

        <p>
            <label for="ifim">Fim: </label>
            <input type="number" name="ifim" id="ifim">
        </p>

        <p>
            <label for="ipasso">Passo: </label>
            <input type="number" name="ipasso" id="ipasso">
        </p>

        <input type="button" value="Contar" onclick="contar()">

        <div id="res">
            <p>Preparando a contagem!!!</p>
        </div>
    </section>

    <script>
        function contar() {
            var iinicio = document.getElementById('iinicio')
            var ifim = document.getElementById('ifim')
            var ipasso = document.getElementById('ipasso')

            var inicio = Number(iinicio.value)
            var fim = Number(ifim.value)
            var passo = Number(ipasso.value)
            var res = document.getElementById('res')

            if (iinicio.value.length == 0 || ipasso.value.length == 0 || ifim.value.length == 0) {
                alert('[ERRO!!!] Faltam dados!')
            } else {
                res.innerHTML = `Contando: `
            }

            if (passo <= 0) {
                alert('PASSO INVALIDO!!!, Considerando passo 1')
                passo = 1
            }

            if (inicio < fim) {

            for (c = inicio; c <= fim; c += passo) {
                res.innerHTML += `${c} `
                }

            } else if (inicio > fim) {

                for (c = inicio; c >= fim; c -= passo) {
                    res.innerHTML += `${c} `
                }
            }
        }
    </script>
</body>
</html>
