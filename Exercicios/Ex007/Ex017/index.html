<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador</title>
    <style>
        body {
            background-color: lightblue;
        }

        h1 {
            text-align: center;
            text-shadow: 3px 3px 5px gray;
            font-size: 2.6em;
            font-family: 'Courier New', Courier, monospace;
        }

        section {
            background-color: white;
            border: 2px solid black;
            border-radius: 5px;
            padding: 10px;

        }
    </style>
</head>
<body>
    <h1>Vamos Contar</h1>

    <section>
        <p>
            <label for="iinicio">Inicio: </label>
            <input type="number" name="iinicio" id="iinicio">
        </p>

        <p>
            <label for="ifim">Fim: </label>
            <input type="number" name="ifim" id="ifim">
        </p>

        <p>
            <label for="ipasso">Passo: </label>
            <input type="number" name="ipasso" id="ipasso">
        </p>

        <div id="res">
            <p>Aqui aparecera o res!!!</p>
        </div>
    </section>

    
</body>
</html>
