<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idade</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Detectador de Idade</h1>
    </header>

    <section>
        <div>
            <p>
                Ano de Nascimento:
                <input type="number" name="idade" id="idade" required>
            </p>

            <p>Qual seu sexo:
                <input type="radio" name="sex" id="raH" checked>
                <label for="raH">Masculino</label>
                
                <input type="radio" name="sex" id="raM">
                <label for="raM">Feminino</label>
            </p>
            <input type="button" value="Verificar" onclick="verificar()">
        </div>

        <div id="res">
            <p>Preencha os dados e veja o resultado</p>
        </div>
    </section>

    <footer>
        <p>CursoEmVideo</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
