<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabuada</title>
    <style>
        body {
            background-color: lightblue;
        }

        h1 {
            text-align: center;
            text-shadow: 3px 3px 5px gray;
            font-size: 2.6em;
            font-family: 'Courier New', Courier, monospace;
        }

        section {
            background-color: white;
            border: 2px solid black;
            border-radius: 5px;
            padding: 10px;

        }

        #sel {
            margin: 10px;
            width: 300px;
        }
    </style>
</head>
<body>
    <h1>Tabuada</h1>

    <section>
        <p>
            <label for="inumber">Digite um número: </label>
            <input type="number" name="inumber" id="inumber">
        </p>

        <input type="button" value="Executar" onclick="tabuada()">

        <div id="res">
            <select name="sel" id="sel" size="10">
                
            </select>
        </div>
    </section>

    <script>
        function tabuada() {
            var inumber = document.getElementById('inumber')
            var res = document.getElementById('res')
            var lista = document.getElementById('sel')
            var n = Number(inumber.value)
            var c = 1
            lista.innerHTML = ''

            while (c <= 10) {
                let item = document.createElement('option')
                var m = n * c
                item.text = `${n} x ${c} = ${m}`
                c++
                lista.appendChild(item)
            }
            inumber.focus()
            inumber.value = ''
        }
    </script>
</body>
</html>
