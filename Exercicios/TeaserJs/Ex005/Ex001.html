<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detran</title>
</head>
<body>
    <h1>Sistema de Multas</h1>
    <input type="number" name="invel" id="invel">
    <input type="button" value="Verificar" onclick="calcular()">
    <div id="res">

    </div>

    <script>

        function calcular() {
            var invel = document.getElementById('invel')
            var vel = Number(invel.value)
            var res = document.getElementById('res')

            res.innerHTML = `<p>Sua velocidade é <strong>${vel}Km/h</strong></p>`
            if (vel > 100) {
                res.innerHTML += '<p><strong>MULTADO!!!</strong> por excesso de velocidade</p>'
            }
            res.innerHTML += '<p>Dirija sempre com cinto de segurança!!!</p>'
        }
    </script>
</body>
</html>
